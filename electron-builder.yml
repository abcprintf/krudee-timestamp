appId: workitdee.krudee.timestamp
productName: KruDee Timestamp
directories:
  output: dist
files:
  - out/**/*
  - resources/**/*
extraResources:
  - from: src/main/db/schema.sql
    to: schema.sql
linux:
  artifactName: ${productName}.${ext}
  target:
    - AppImage
  category: Education
  icon: resources/icon.png
win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico
mac:
  target:
    - dmg
    - zip
  category: public.app-category.education
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
nsis:
  oneClick: true
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: abcprintf
  repo: krudee-timestamp
  releaseType: release
